name: Build & Release

on:
  push:
    tags:
      - "v*" # triggers on version tags like v1.0.0
  workflow_dispatch: # allows manual trigger from GitHub UI

env:
  BINARY_NAME: slide # NB env not visible inside strategy.matrix!
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Yuck! upload-artifact@v5 should have sorted this....

jobs:
  build-z80:
    name: Build Z80 z80-binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install sjasmplus
        # run: sudo apt-get install -y sjasmplus
        run: |
          git clone --depth 1 https://github.com/z00m128/sjasmplus.git  --recurse-submodules # --branch v1.21.1
          cd sjasmplus && make && sudo make install

      - name: Assemble Z80 binary
        run: sjasmplus slide.asm --raw=slide.com

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: z80-binary
          path: slide.com

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-amd64
            ext: ""
          - os: windows-latest
            suffix: windows-amd64
            ext: .exe
          - os: macos-latest
            suffix: macos-amd64
            ext: ""

    steps:
      - uses: actions/checkout@v5

      - name: Install linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        working-directory: slide-rs
        run: cargo build --release

      - name: Import certificate to keychain (macOS)
        if: matrix.os == 'macos-latest'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_KEYCHAIN_PWD: ${{ secrets.MACOS_KEYCHAIN_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$MACOS_KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$MACOS_KEYCHAIN_PWD" build.keychain

      - name: Sign binary (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          codesign --sign "Developer ID Application: Anthony Skelton (96PCNZ64GF)" \
            --force --options runtime \
            slide-rs/target/release/${{ env.BINARY_NAME }}

      - name: Notarize binary (macOS)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          echo "$APPLE_API_KEY" > api_key.p8
          zip slide.zip slide-rs/target/release/${{ env.BINARY_NAME }}
          xcrun notarytool submit slide.zip \
            --key api_key.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.suffix }}
          path: slide-rs/target/release/${{ env.BINARY_NAME }}${{ matrix.ext }}

  release:
    name: Create Release
    needs: [build, build-z80]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.BINARY_NAME }}-linux-amd64/${{ env.BINARY_NAME }}
            ${{ env.BINARY_NAME }}-windows-amd64/${{ env.BINARY_NAME }}.exe
            ${{ env.BINARY_NAME }}-macos-amd64/${{ env.BINARY_NAME }}
            z80-binary/slide.com
