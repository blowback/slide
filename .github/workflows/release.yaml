name: Build & Release

on:
  push:
    tags:
      - "v*" # triggers on version tags like v1.0.0
  workflow_dispatch: # allows manual trigger from GitHub UI

env:
  BINARY_NAME: slide # NB env not visible inside strategy.matrix!
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Yuck! upload-artifact@v5 should have sorted this....

jobs:
  build-z80:
    name: Build Z80 z80-binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install sjasmplus
        # run: sudo apt-get install -y sjasmplus
        run: |
          git clone --depth 1 https://github.com/z00m128/sjasmplus.git  --recurse-submodules # --branch v1.21.1
          cd sjasmplus && make && sudo make install

      - name: Assemble Z80 binary
        run: sjasmplus slide.asm --raw=slide.com

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: z80-binary
          path: slide.com

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-amd64
            ext: ""
          - os: windows-latest
            suffix: windows-amd64
            ext: .exe
          - os: macos-latest
            suffix: macos-amd64
            ext: ""

    steps:
      - uses: actions/checkout@v5

      - name: Install linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        working-directory: slide-rs
        run: cargo build --release

      - name: Sign binary (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: slide-rs/target/release
        run: codesign --sign - --force --preserve-metadata=entitlements,requirements,flags,runtime ${{ env.BINARY_NAME }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.suffix }}
          path: slide-rs/target/release/${{ env.BINARY_NAME }}${{ matrix.ext }}

  release:
    name: Create Release
    needs: [build, build-z80]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.BINARY_NAME }}-linux-amd64/${{ env.BINARY_NAME }}
            ${{ env.BINARY_NAME }}-windows-amd64/${{ env.BINARY_NAME }}.exe
            ${{ env.BINARY_NAME }}-macos-amd64/${{ env.BINARY_NAME }}
            z80-binary/slide.com
