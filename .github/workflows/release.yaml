name: Build & Release

on:
  push:
    tags:
      - "v*" # triggers on version tags like v1.0.0
  workflow_dispatch: # allows manual trigger from GitHub UI

env:
  BINARY_NAME: slide # NB env not visible inside strategy.matrix!

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-amd64
            ext: ""
          - os: windows-latest
            suffix: windows-amd64
            ext: .exe
          - os: macos-latest
            suffix: macos-amd64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        working-directory: slide-rs
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.suffix }}
          path: slide-rs/target/release/${{ env.BINARY_NAME }}${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.BINARY_NAME }}-linux-amd64/${{ env.BINARY_NAME }}
            ${{ env.BINARY_NAME }}-windows-amd64/${{ env.BINARY_NAME }}.exe
            ${{ env.BINARY_NAME }}-macos-amd64/${{ env.BINARY_NAME }}
            z80-binary/your-output.bin
